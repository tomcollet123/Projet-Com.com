<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LABNUM CECMED - Innovation & Défense</title>
    <style>
        /* ============================================
           RESET & VARIABLES DE BASE
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #001F3F;
            color: #FFFFFF;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><defs><linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:%23001F3F;stop-opacity:1" /><stop offset="100%" style="stop-color:%23003366;stop-opacity:1" /></linearGradient></defs><rect width="1200" height="800" fill="url(%23bg1)"/></svg>');
            background-attachment: fixed;
            background-size: cover;
        }

        /* ============================================
           ANIMATIONS
           ============================================ */
        @keyframes fadeIn { 
            from { opacity: 0; } 
            to { opacity: 1; } 
        }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* ============================================
           NAVIGATION
           ============================================ */
        nav {
            background: linear-gradient(135deg, rgba(0, 31, 63, 0.95) 0%, rgba(0, 50, 100, 0.95) 100%);
            padding: 15px 20px;
            border-bottom: 2px solid #FF851B;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .nav-logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #FF851B, #00CC44);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.5rem;
            color: #001F3F;
        }

        .nav-logo-text {
            color: #FF851B;
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nav-links {
            flex: 1;
            text-align: center;
        }

        nav a {
            display: inline-block;
            margin: 0 20px;
            color: #FFFFFF;
            text-decoration: none;
            font-weight: 900;
            font-size: 1rem;
            text-transform: uppercase;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            cursor: pointer;
        }

        nav a:hover {
            color: #FF851B;
            text-shadow: 0 0 10px rgba(255, 133, 27, 0.6);
        }

        nav a.active {
            color: #FF851B;
            border-bottom: 3px solid #FF851B;
            padding-bottom: 5px;
        }

        /* ============================================
           SECTION HERO
           ============================================ */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, rgba(0, 31, 63, 0.8) 0%, rgba(0, 50, 100, 0.8) 100%);
            animation: fadeIn 1s ease-out;
        }

        .hero-content h1 {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 15px;
            color: #FFFFFF;
            text-shadow: 0 0 20px rgba(255, 133, 27, 0.5);
            letter-spacing: 3px;
        }

        .hero-content h1 .cecmed {
            color: #FF851B;
        }

        .hero-content p {
            font-size: 1.5rem;
            color: #E8E8E8;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ============================================
           TITRES H2
           ============================================ */
        h2 {
            font-size: 2.2rem;
            font-weight: 900;
            color: #FFFFFF;
            text-shadow: 0 0 20px rgba(255, 133, 27, 0.5);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
        }

        h2 .highlight {
            color: #FF851B;
        }

        .divider {
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, #FF851B, #00CC44);
            margin: 0 auto 40px;
            box-shadow: 0 0 15px rgba(255, 133, 27, 0.6);
        }

        /* ============================================
           SECTION PRÉSENTATION
           ============================================ */
        .presentation {
            background: linear-gradient(135deg, rgba(0, 31, 63, 0.95) 0%, rgba(0, 50, 100, 0.95) 100%);
            padding: 100px 20px;
            text-align: center;
        }

        .presentation-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .presentation h2 {
            margin-bottom: 30px;
        }

        .presentation p {
            font-size: 1.1rem;
            color: #E8E8E8;
            line-height: 1.8;
            margin-bottom: 20px;
            text-align: justify;
        }

        /* ============================================
           SECTION CTA
           ============================================ */
        .cta-section {
            background: linear-gradient(135deg, rgba(0, 31, 63, 0.95) 0%, rgba(0, 50, 100, 0.95) 100%);
            padding: 80px 20px;
            text-align: center;
        }

        .cta-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .cta-button {
            display: inline-block;
            padding: 18px 50px;
            background: #FF851B;
            color: #001F3F;
            text-decoration: none;
            font-weight: 900;
            border-radius: 5px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1.1rem;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 15px rgba(255, 133, 27, 0.3);
        }

        .cta-button:hover {
            background: #FFFFFF;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 133, 27, 0.4);
        }

        /* ============================================
           SECTION FAQ
           ============================================ */
        .faq-section {
            background: linear-gradient(135deg, rgba(0, 31, 63, 0.95) 0%, rgba(0, 50, 100, 0.95) 100%);
            padding: 100px 20px;
        }

        .faq-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .faq-section h2 {
            margin-bottom: 30px;
        }

        .faq-items {
            display: flex;
            flex-direction: column;
            gap: 40px;
            max-width: 900px;
            margin: 0 auto;
        }

        .faq-item {
            animation: slideUp 0.6s ease-out;
        }

        .faq-question {
            font-size: 1.3rem;
            font-weight: 900;
            color: #FF851B;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .faq-answer {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.05) 100%);
            border-left: 4px solid #FF851B;
            padding: 25px;
            border-radius: 5px;
            color: #E8E8E8;
            line-height: 1.8;
            font-size: 1rem;
            text-align: justify;
            text-justify: inter-word;
        }

        /* ============================================
           SECTION PROJETS
           ============================================ */
        .projects-section {
            background: linear-gradient(135deg, rgba(0, 31, 63, 0.95) 0%, rgba(0, 50, 100, 0.95) 100%);
            padding: 100px 20px;
            display: none;
            min-height: 100vh;
        }

        .projects-section.active {
            display: block;
        }

        .projects-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .projects-section > h2 {
            margin-bottom: 30px;
        }

        .projects-subsection {
            margin-bottom: 100px;
        }

        .projects-subsection h3 {
            font-size: 1.8rem;
            color: #FFFFFF;
            margin-bottom: 50px;
            padding-bottom: 15px;
            border-bottom: 3px solid #FF851B;
            display: inline-block;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .projects-subsection.operationnel h3 {
            border-bottom-color: #00CC44;
        }

        .project-item {
            background: linear-gradient(135deg, rgba(0, 50, 100, 0.8) 0%, rgba(0, 31, 63, 0.9) 100%);
            border: 2px solid #FF851B;
            border-radius: 10px;
            padding: 40px;
            margin: 0 auto 40px;
            max-width: 950px;
            animation: slideUp 0.6s ease-out;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .project-item.operationnel {
            border-color: #00CC44;
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255, 133, 27, 0.3);
        }

        .project-header h3 {
            font-size: 1.8rem;
            color: #FFFFFF;
            font-weight: 900;
            margin: 0;
            flex-grow: 1;
            margin-right: 20px;
        }

        .project-status {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 900;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .status-encours {
            background: rgba(255, 133, 27, 0.3);
            color: #FF851B;
            border: 2px solid #FF851B;
        }

        .status-operationnel {
            background: rgba(0, 204, 68, 0.3);
            color: #00CC44;
            border: 2px solid #00CC44;
        }

        .project-content {
            margin-bottom: 30px;
        }

        .project-content p {
            color: #E8E8E8;
            font-size: 1.05rem;
            line-height: 1.9;
            margin-bottom: 20px;
            text-align: justify;
            text-justify: inter-word;
        }

        .project-images {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 40px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .project-image {
            width: 100%;
            height: auto;
            border-radius: 8px;
            border: 2px solid #FF851B;
            display: block;
            transition: all 0.3s ease;
        }

        .project-image:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(255, 133, 27, 0.3);
        }

        /* ============================================
           SECTION CONTACT
           ============================================ */
        .contact-section {
            background: linear-gradient(135deg, rgba(0, 31, 63, 0.95) 0%, rgba(0, 50, 100, 0.95) 100%);
            padding: 100px 20px;
        }

        .contact-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .contact-section h2 {
            margin-bottom: 30px;
        }

        .contact-form {
            background: linear-gradient(135deg, rgba(0, 50, 100, 0.6) 0%, rgba(0, 31, 63, 0.8) 100%);
            border: 2px solid #FF851B;
            border-radius: 10px;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #FFFFFF;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.08);
            color: #FFFFFF;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #FF851B;
            box-shadow: 0 0 15px rgba(255, 133, 27, 0.3);
            background: rgba(255, 255, 255, 0.12);
            outline: none;
        }

        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #FF851B;
            color: #001F3F;
            border: none;
            border-radius: 5px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            background: #FFFFFF;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 133, 27, 0.4);
        }

        /* ============================================
           SECTION POC
           ============================================ */
        .poc-section {
            background: linear-gradient(135deg, rgba(0, 31, 63, 0.95) 0%, rgba(0, 50, 100, 0.95) 100%);
            padding: 100px 20px;
        }

        .poc-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .poc-section h2 {
            margin-bottom: 30px;
        }

        .poc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .poc-card {
            background: linear-gradient(135deg, rgba(0, 50, 100, 0.8) 0%, rgba(0, 31, 63, 0.9) 100%);
            border: 2px solid #FF851B;
            border-radius: 10px;
            padding: 30px;
            transition: all 0.3s ease;
            animation: slideUp 0.6s ease-out;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .poc-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(255, 133, 27, 0.3);
            border-color: #FFFFFF;
        }

        .poc-card h3 {
            font-size: 1.4rem;
            color: #FFFFFF;
            margin-bottom: 15px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .poc-card p {
            color: #FFFFFF;
            margin-bottom: 12px;
            font-size: 1rem;
            line-height: 1.6;
        }

        .poc-label {
            font-weight: 900;
            color: #FF851B;
            text-transform: uppercase;
            font-size: 0.85rem;
            margin-bottom: 5px;
            display: block;
        }

        .poc-info {
            color: #FFFFFF;
            font-size: 1rem;
        }

        .poc-email-section {
            background: linear-gradient(135deg, rgba(0, 50, 100, 0.8) 0%, rgba(0, 31, 63, 0.9) 100%);
            border: 2px solid #FF851B;
            border-radius: 10px;
            padding: 30px;
            margin-top: 30px;
            text-align: center;
            animation: slideUp 0.6s ease-out;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .poc-email-section h4 {
            color: #FF851B;
            font-size: 1.1rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .poc-email-section p {
            color: #FFFFFF;
            font-size: 1rem;
        }

        /* ============================================
           FOOTER
           ============================================ */
        footer {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.7) 0%, rgba(0, 0, 0, 0.8) 100%);
            padding: 30px 20px;
            text-align: center;
            color: #E8E8E8;
            border-top: 2px solid #FF851B;
        }
