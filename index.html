<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LABNUM CECMED - Innovation & Défense</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="hero">
        <div class="hero-content">
            <!-- Logo SVG -->
            <svg class="logo" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
                <!-- Cercle du logo en haut -->
                <circle cx="400" cy="150" r="80" fill="none" stroke="rgba(255, 133, 27, 0.3)" stroke-width="3"/>
                <circle cx="400" cy="150" r="60" fill="none" stroke="rgba(255, 133, 27, 0.2)" stroke-width="2"/>
                
                <!-- LABNUM en blanc -->
                <text x="400" y="320" font-size="120" font-weight="900" text-anchor="middle" fill="#FFFFFF" font-family="'Segoe UI', sans-serif" letter-spacing="5">
                    LABNUM
                </text>
                
                <!-- CECMED en orange -->
                <text x="400" y="320" font-size="120" font-weight="900" text-anchor="middle" fill="#FF851B" font-family="'Segoe UI', sans-serif" letter-spacing="5" x="680">
                    CECMED
                </text>
                
                <!-- INNOVATION & DÉFENSE -->
                <text x="400" y="420" font-size="28" text-anchor="middle" fill="#FFFFFF" font-family="'Segoe UI', sans-serif" letter-spacing="3">
                    INNOVATION &amp; DÉFENSE
                </text>
            </svg>

            <p class="tagline">Innovation & Défense</p>
        </div>
    </header>

    <main class="container">
        <!-- Sections will be added here -->
    </main>
</body>
</html>
